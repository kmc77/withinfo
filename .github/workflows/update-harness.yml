name: Update Harness from TIL
on:
  push:
    paths:
      - 'TIL/**/*.md'
jobs:
  update-harness:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Get changed TIL files
        id: changed
        run: |
          changed=$(git diff --name-only HEAD~1 HEAD -- 'TIL/**/*.md' | head -5)
          echo "files=$changed" >> $GITHUB_OUTPUT

      - name: Write harness template if missing
        run: |
          mkdir -p harness
          HARNESS="harness/kobc-aragon-harness.md"
          if [ ! -f "$HARNESS" ]; then
            cp harness-template.md "$HARNESS" 2>/dev/null || touch "$HARNESS"
          fi

      - name: Append TIL to Harness
        run: |
          HARNESS="harness/kobc-aragon-harness.md"
          FILES="${{ steps.changed.outputs.files }}"
          for f in $FILES; do
            if [ -f "$f" ]; then
              echo "" >> "$HARNESS"
              echo "### $(basename "$f" .md)" >> "$HARNESS"
              echo "" >> "$HARNESS"
              cat "$f" >> "$HARNESS"
              echo "" >> "$HARNESS"
            fi
          done

      - name: Commit harness update
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add harness/
          git diff --staged --quiet || git commit -m "auto: harness updated from TIL [skip ci]"
          git push
