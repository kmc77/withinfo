name: Update Harness from TIL
on:
  push:
    paths:
      - 'TIL/**/*.md'
jobs:
  update-harness:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Get changed TIL files
        id: changed
        run: |
          changed=$(git diff --name-only HEAD~1 HEAD -- 'TIL/**/*.md' | head -5)
          echo "files=$changed" >> $GITHUB_OUTPUT
      - name: Append TIL to Harness
        run: |
          mkdir -p harness
          HARNESS="harness/kobc-aragon-harness.md"
          if [ ! -f "$HARNESS" ]; then
            printf '# KOBC AraOn 정책팀 하네스\n' > "$HARNESS"
            printf '마지막 업데이트: 자동 (TIL 기반)\n\n' >> "$HARNESS"
            printf '## [데이터 패턴 규칙]\n\n' >> "$HARNESS"
            printf '## [선임 사고 패턴 규칙]\n\n' >> "$HARNESS"
            printf '## [아직 불확실한 것]\n\n' >> "$HARNESS"
            printf '## [TIL 원문 아카이브]\n' >> "$HARNESS"
          fi
          FILES="${{ steps.changed.outputs.files }}"
          for f in $FILES; do
            if [ -f "$f" ]; then
              echo "" >> "$HARNESS"
              echo "### $(basename "$f" .md)" >> "$HARNESS"
              echo "" >> "$HARNESS"
              cat "$f" >> "$HARNESS"
              echo "" >> "$HARNESS"
            fi
          done
      - name: Commit harness update
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add harness/
          git diff --staged --quiet || git commit -m "auto: harness updated from TIL [skip ci]"
          git push
