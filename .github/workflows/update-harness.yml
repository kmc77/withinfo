name: Update Harness from TIL
on:
  push:
    paths:
      - 'TIL/**/*.md'
jobs:
  update-harness:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Init harness if missing
        run: |
          mkdir -p harness
          HARNESS="harness/kobc-aragon-harness.md"
          if [ ! -f "$HARNESS" ]; then
            cp harness/harness-template.md "$HARNESS" 2>/dev/null || touch "$HARNESS"
          fi

      - name: Append changed TIL files to harness
        run: |
          HARNESS="harness/kobc-aragon-harness.md"
          git diff --name-only HEAD~1 HEAD -- 'TIL/**/*.md' | head -5 | while IFS= read -r f; do
            [ -z "$f" ] && continue
            [ -f "$f" ] || continue
            echo "" >> "$HARNESS"
            echo "### $(basename "$f" .md)" >> "$HARNESS"
            echo "" >> "$HARNESS"
            cat "$f" >> "$HARNESS"
            echo "" >> "$HARNESS"
          done

      - name: Commit harness update
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add harness/
          git diff --staged --quiet || git commit -m "auto: harness updated from TIL [skip ci]"
          git push
